<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Form</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<script src = "script.js"></script>
<body>
    <header id="title">Signup Form</header>
    <section id="form">
        <div id ="container">
    <form>
        <label id="firstname" for ="firstname">First Name:</label>
        <input type="text" id="fname" placeholder="Eg: Pratik" name="fname" required><br><br>

        <label id = "lastname" for ="lastname">Last Name:</label>
        <input type="text" id ="lname" placeholder="Eg: Pokhrel" name="lname" required ><br><br>
    
        <label id = "conatct" for ="contact" name="conatct">Contact:</label>
        <input type="conatct" id="con" placeholder="Eg: 9890989098"  name="con" required><br><br>

        <label id = "email" for ="email" name="email">Email:</label>
        <input type="email" id="conatct" placeholder="Eg: user@gmail.com"  name="email" required><br><br>

        <label id = "address" for ="address" name="address">Address:</label>
        <input type="text" id="address" placeholder="Eg: Kathmandu, Nepal"  name="address" required><br><br>

        <button id="submit" type="submit">Signup</button><br><br><br>
    </form>
    </div>
    </section>
    <footer id="footer">2026 @Crafted by Pratik. All rights are reserved.</footer>

</body>
</html>
